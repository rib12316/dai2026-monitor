name: DAI 2026 Deadline Monitor

on:
  # 不使用 GitHub 自带的 schedule —— 它在本仓库上触发不稳定(有时完全不触发,
  # 有时延迟3小时才触发),会导致重复发送或漏发。改用外部 cron-job.org 通过
  # repository_dispatch 触发,稳定且准时,保证一天只发一次。
  repository_dispatch: {}  # cron-job.org 每天定时调用此触发器
  workflow_dispatch: {}    # 允许在 Actions 页面手动点击触发(备用)

permissions:
  contents: write  # 需要写权限以提交 last_dates.json 的变更

concurrency:
  group: dai2026-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python monitor.py

      - name: Commit state file if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain last_dates.json)" ]]; then
            git add last_dates.json
            git commit -m "chore: update deadline snapshot [skip ci]"
            git push
            echo "Pushed updated snapshot."
          else
            echo "No snapshot change, nothing to push."
          fi
